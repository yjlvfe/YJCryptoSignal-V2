name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Dev/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile check all Python files
        run: |
          find . -name '*.py' -not -path './venv/*' -not -path './bot/_archive/*' -exec python3 -m py_compile {} \;

  test:
    needs: compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Dev/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python3 -m pytest tests/ -v